<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Closer — Dashboard</title>
<style>
  :root{
    --bg:#f4f6f8; --panel:#fff; --ink:#0f172a; --muted:#667085; --line:#e6eaef;
    --pri:#0e7c86; --priSoft:#e6f4f5; --ok:#16a34a; --okSoft:#e7f6ec; --bad:#dc2626; --badSoft:#fdecec; --warn:#c2740a; --warnSoft:#fbf0e0;
    --side:#10262b; --sideMut:#7fa3a8; --sideAct:#163a40;
    --sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.07);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  .app{display:flex;height:100vh;overflow:hidden}
  /* sidebar */
  .side{width:224px;background:var(--side);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 16px;font-weight:700;font-size:16px;letter-spacing:.2px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:var(--pri);display:flex;align-items:center;justify-content:center}
  .nav{display:flex;flex-direction:column;gap:2px;padding:6px 10px}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--sideMut);cursor:pointer;font-weight:500;font-size:14px}
  .nav a svg{width:18px;height:18px;flex-shrink:0}
  .nav a:hover{background:var(--sideAct);color:#fff}
  .nav a.active{background:var(--pri);color:#fff}
  .side .foot{padding:12px 18px;font-size:11px;color:#5c8189}
  /* sidebar chuyên nghiệp */
  .brand{border-bottom:1px solid #1c3a40;padding-bottom:16px}
  .brand .logo{box-shadow:0 2px 10px rgba(14,124,134,.45);font-size:16px}
  .brandtxt{display:flex;flex-direction:column;line-height:1.15}
  .brandtxt .bname{font-weight:700;font-size:15.5px}
  .brandtxt .bsub{font-size:11px;color:var(--sideMut);font-weight:500;margin-top:2px}
  .navlabel{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#5c8189;padding:16px 14px 5px}
  .navlabel:first-child{padding-top:10px}
  .nav a.ext .extarrow{margin-left:auto;width:13px;height:13px;opacity:.5}
  .nav a.ext:hover .extarrow{opacity:1}
  .sidestat{margin-top:auto;display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:12px;color:var(--sideMut);border-top:1px solid #1c3a40}
  .sidestat .dot{width:7px;height:7px;box-shadow:0 0 0 3px rgba(22,163,74,.15)}
  /* main */
  .wrap{flex:1;display:flex;flex-direction:column;min-width:0}
  .top{height:60px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;flex-shrink:0}
  .top h1{font-size:16px;margin:0;font-weight:650}
  .top .sp{flex:1}
  .stat{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:#f7f9fa;border:1px solid var(--line);padding:5px 11px;border-radius:20px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px var(--okSoft)}
  .dot.bad{background:var(--bad);box-shadow:0 0 0 3px var(--badSoft)}
  .iconbtn{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
  .iconbtn:hover{background:#f5f6f7;color:var(--ink)}
  .content{flex:1;overflow:auto;padding:22px}
  h2{font-size:18px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  /* cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:20px}
  .mc{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;box-shadow:var(--sh);cursor:pointer;transition:.12s}
  .mc:hover{transform:translateY(-2px);border-color:#cfd8df}
  .mc .ic{width:34px;height:34px;border-radius:9px;background:var(--priSoft);color:var(--pri);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .mc .l{font-size:12.5px;color:var(--muted)} .mc .v{font-size:27px;font-weight:700;margin-top:2px;line-height:1.1}
  .mc .d{font-size:11.5px;color:var(--muted);margin-top:5px}
  /* table */
  .tablecard{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line)} th{background:#fafbfc;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
  tbody tr:hover{background:#fafcfc} tr:last-child td{border-bottom:none}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 10px;border-radius:20px;font-weight:600}
  .pill.ok{background:var(--okSoft);color:var(--ok)} .pill.bad{background:var(--badSoft);color:var(--bad)} .pill.warn{background:var(--warnSoft);color:var(--warn)} .pill.mut{background:#eef1f3;color:var(--muted)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:#f5f6f7} .btn.pri{background:var(--pri);color:#fff;border-color:var(--pri)} .btn.pri:hover{background:#0c6c75} .btn.sm{padding:5px 9px;font-size:12.5px} .btn svg{width:15px;height:15px}
  input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit;outline:none;background:#fff} input:focus,select:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--priSoft)}
  .row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .toggle{width:40px;height:23px;border-radius:13px;background:#cbd5db;position:relative;transition:.15s;cursor:pointer;flex-shrink:0}
  .toggle.on{background:var(--ok)} .toggle::after{content:'';position:absolute;width:19px;height:19px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)} .toggle.on::after{left:18px}
  .search{position:relative;max-width:280px} .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)} .search input{padding-left:34px;width:100%}
  .muted{color:var(--muted)} .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted)}
  /* conversations */
  .convo{display:grid;grid-template-columns:330px 1fr;gap:16px;height:calc(100vh - 200px)}
  @media(max-width:880px){.convo{grid-template-columns:1fr;height:auto}}
  .list{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);overflow:auto}
  .ci{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
  .ci:hover{background:#fafcfc} .ci.sel{background:var(--priSoft)}
  .av{width:34px;height:34px;border-radius:50%;background:var(--priSoft);color:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .ci .t{font-weight:600;font-size:13px;display:flex;justify-content:space-between;gap:6px} .ci .s{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
  .phd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .tr{flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px;padding:16px}
  .bub{max-width:78%;padding:9px 13px;border-radius:15px;font-size:13.5px;white-space:pre-wrap;line-height:1.45}
  .bub.customer{align-self:flex-start;background:#eef1f4;border-bottom-left-radius:5px}
  .bub.ai{align-self:flex-end;background:var(--pri);color:#fff;border-bottom-right-radius:5px}
  .bub.agent{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:5px}
  .bub.system{align-self:center;background:var(--warnSoft);color:var(--warn);font-size:12px}
  .composer{padding:12px;border-top:1px solid var(--line);display:flex;gap:9px}
  .empty{padding:48px 20px;text-align:center;color:var(--muted)}
  /* toast */
  #toast{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:8px;z-index:50}
  .tt{background:#10262b;color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:0 6px 24px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;animation:in .2s}
  .tt.ok{background:#0e7c86} .tt.bad{background:#dc2626}
  @keyframes in{from{opacity:0;transform:translateY(8px)}}
  /* KB product cards */
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);padding:18px;margin-bottom:14px}
  /* KB editor: gộp cấu hình AI + sản phẩm trong 1 khung */
  .kbeditor{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--sh);padding:2px 20px 16px}
  .cfgsec{padding:16px 0 4px;border-left:3px solid var(--pri);padding-left:14px;margin-top:8px}
  .kbsec{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding:14px 0 2px;border-top:1px solid var(--line);margin-top:14px}
  .kbeditor .pcard{border:none;box-shadow:none;border-radius:0;margin:0;padding:16px 0;border-top:1px dashed var(--line)}
  .kbeditor .pcard:first-of-type{border-top:none;padding-top:8px}
  .pcard .fh{display:flex;gap:12px;align-items:flex-end;margin-bottom:14px}
  .fld{display:flex;flex-direction:column;gap:5px;min-width:0}
  .fld>label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .fld input,.fld textarea,.fld select{width:100%}
  .pcard textarea{resize:vertical;min-height:46px;line-height:1.45}
  .grid5{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:12px}
  .imgbox2{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
  .imglist{display:flex;flex-wrap:wrap;gap:10px}
  .imtile{width:92px;position:relative}
  .imtile .imthumb{width:92px;height:92px;border-radius:10px;border:1px solid var(--line);background:#f7f9fa center/cover no-repeat;cursor:pointer}
  .imtile .imlabel{width:92px;margin-top:5px;padding:4px 6px;font-size:11px;text-align:center}
  .imtile .imx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:none;background:var(--bad);color:#fff;cursor:pointer;font-size:12px;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .imadd .imthumb{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:12px;gap:3px;border-style:dashed}
  .imadd .imthumb:hover{background:var(--priSoft);color:var(--pri);border-color:var(--pri)}
  /* bảng gói giá linh hoạt */
  .pricebox{margin:4px 0 14px;padding:14px 16px;background:#fafbfc;border:1px solid var(--line);border-radius:10px}
  .pricebox>.pblabel{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:11px}
  .tierrow{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13.5px;flex-wrap:wrap}
  .tierrow input{padding:7px 9px}
  .tierrow .tl{flex:1;min-width:150px} .tierrow .tp{width:110px}
  .tierx{width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--muted);flex-shrink:0}
  .tierx:hover{background:var(--badSoft);color:var(--bad);border-color:var(--badSoft)}
  .imtile select.imlabel{width:92px;font-size:11px;padding:4px 4px;border-radius:7px;cursor:pointer}
  /* product card header + actions */
  .phead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;cursor:pointer}
  .ptitle{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ptitle .num{color:var(--muted);font-weight:500;margin-right:6px}
  .pacts{display:flex;gap:6px;flex-shrink:0}
  .actbtn{width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center}
  .actbtn:hover{background:#f5f6f7;color:var(--ink)} .actbtn.del:hover{background:var(--badSoft);color:var(--bad);border-color:var(--badSoft)}
  .pcard.collapsed .pbody{display:none}
  .caret{transition:.15s;display:inline-block;color:var(--muted)} .pcard.collapsed .caret{transform:rotate(-90deg)}
  .rmx{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--muted);flex-shrink:0}
  .rmx:hover{background:var(--badSoft);color:var(--bad);border-color:var(--badSoft)}
  .kbbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin:6px 0 16px;position:sticky;top:0;z-index:8}
  .combo-drop{position:absolute;top:100%;left:0;right:0;z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 28px rgba(16,24,40,.14);max-height:340px;overflow:auto;margin-top:5px;display:none}
  .ci2{padding:9px 13px;cursor:pointer;font-size:13.5px;border-bottom:1px solid #f1f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci2:hover{background:var(--priSoft)} .ci2:last-child{border-bottom:none}
  /* 1 trang cuộn dọc: mỗi section cách nhau + chừa chỗ khi cuộn tới */
  .hsec{display:block;scroll-margin-top:16px} .hsec+.hsec{margin-top:38px;padding-top:30px;border-top:1px solid var(--line)}
  .hsec:empty{display:none}
  /* bộ lọc ngày */
  .drange{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .drange input[type=date]{padding:6px 9px;font-size:12.5px}
  /* filter chips */
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--muted);font-weight:500}
  .chip:hover{background:#f5f6f7} .chip.act{background:var(--pri);color:#fff;border-color:var(--pri)}
  /* page management cards */
  .pglist{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:14px}
  @media(max-width:1000px){.pglist{grid-template-columns:1fr}}
  .pg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden;transition:.12s}
  .pg:hover{border-color:#cfd8df;box-shadow:0 5px 16px rgba(16,24,40,.08)}
  .pg.on{border-left:3px solid var(--ok)}
  .pgacts{display:flex;flex-direction:column;gap:7px;padding:14px 12px;background:#fafbfc;border-right:1px solid var(--line);width:116px;flex-shrink:0}
  .pgbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 6px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--ink);font-weight:500}
  .pgbtn svg{width:14px;height:14px} .pgbtn:hover{background:#eef1f3}
  .pgbtn.ai{background:var(--ok);border-color:var(--ok);color:#fff;font-weight:600} .pgbtn.ai:hover{background:#138a3d}
  .pgbtn.aioff{color:var(--muted)}
  .pgbody{flex:1;min-width:0;padding:14px 16px;display:flex;flex-direction:column;gap:9px}
  .pghd{display:flex;align-items:center;gap:10px}
  .pgname{font-weight:650;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pgtags{display:flex;gap:6px;flex-wrap:wrap}
  .pgprev{font-size:12.5px;color:var(--muted);background:#f7f9fa;border-radius:8px;padding:8px 11px;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .pgfoot{display:flex;gap:18px;font-size:12px;color:var(--muted);margin-top:auto;padding-top:2px}
  .pgfoot b{color:var(--ink)}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <span class="logo">🤖</span>
      <div class="brandtxt"><span class="bname">AI Closer</span><span class="bsub">Sales AI · Messenger</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidestat"><span class="dot" id="sidedot"></span><span id="sidestattxt">đang kết nối…</span></div>
    <div class="foot">v0.2 · Pilot PH/ME</div>
  </aside>
  <div class="wrap">
    <header class="top">
      <h1 id="ttl">Bảng điều khiển</h1>
      <div class="sp"></div>
      <div class="stat"><span class="dot" id="sdot"></span><span id="sstat">server</span></div>
      <div class="stat" id="stok">— token</div>
      <div class="stat" id="spage">— page</div>
      <div class="iconbtn" title="Làm mới" onclick="renderHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg></div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>
<div id="toast"></div>
<script>
const API='/admin/api';
const j=(u,o)=>fetch(API+u,o).then(r=>r.json());
const post=(u,b)=>j(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const del=u=>j(u,{method:'DELETE'});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ago=t=>{if(!t)return'';const d=(Date.now()-t)/1000;if(d<60)return Math.round(d)+'s';if(d<3600)return Math.round(d/60)+'m';return Math.round(d/3600)+'h';};
const ini=s=>(String(s||'?').trim()[0]||'?').toUpperCase();
function toast(m,type='ok'){const e=document.createElement('div');e.className='tt '+type;e.textContent=m;document.getElementById('toast').appendChild(e);setTimeout(()=>e.remove(),2600);}
const IC={overview:'<path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>',pages:'<path d="M12 2 2 7l10 5 10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>',msgs:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',kb:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5z"/>',tokens:'<path d="M21 2l-2 2m-7.6 7.6a5 5 0 1 0-7 7 5 5 0 0 0 7-7zm0 0L15 8m0 0l3 3 3-3-3-3"/>',stats:'<path d="M3 3v18h18M7 16v-6M12 16V8M17 16v-3"/>'};
const svg=p=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const search=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>`;

// 1 TRANG CUỘN DỌC: tất cả section trên cùng 1 trang. Menu chỉ giữ lối tắt tới Cài đặt
// (nằm cuối trang) — 3 mục Tổng quan/Pages/Tin nhắn đã gộp nên bỏ khỏi menu.
const NAV=[['tokens','Cài đặt / Token','tokens']];
// Tool "bắn bot khách cũ" (Gửi tin hàng loạt) chạy riêng trên cùng VPS, cổng 3002 → mở tab mới.
const BROADCAST_URL=`http://${location.hostname}:3002`;
const IC_MEGA='<path d="M3 11l18-5v12L3 14v-3zM11.6 16.8a3 3 0 1 1-5.8-1.6"/>';
let ctx={pageId:'',pageName:''}, selPsid=null, statsTimer=null, msgsTimer=null, RANGE={key:'all',from:null,to:null};
const content=document.getElementById('content');
const sec=id=>document.getElementById('sec-'+id);
const extArrow='<svg class="extarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>';
document.getElementById('nav').innerHTML=
  `<div class="navlabel">Công cụ</div>`
  +`<a class="ext" title="Bắn tin hàng loạt cho khách cũ (mở tab mới)" onclick="window.open(BROADCAST_URL,'_blank')">${svg(IC_MEGA)} <span>Bắn bot khách cũ</span> ${extArrow}</a>`

  if(s<86400)return Math.floor(s/3600)+' giờ trước';return Math.floor(s/86400)+' ngày trước';}

const RANGE_PRESETS=[['today','Hôm nay'],['7','7 ngày'],['30','30 ngày'],['all','Tất cả']];
function rangeQ(){return RANGE.from?`?from=${RANGE.from}&to=${RANGE.to}`:'';}
function rangeLabel(){if(RANGE.key==='all')return 'toàn thời gian';if(RANGE.key==='today')return 'hôm nay';if(RANGE.key==='custom')return RANGE.from+' → '+RANGE.to;return RANGE.from+' → '+RANGE.to;}
const _ymd=d=>d.toISOString().slice(0,10);
window.setRange=k=>{const t=new Date();
  if(k==='all')RANGE={key:'all',from:null,to:null};
  else if(k==='today')RANGE={key:'today',from:_ymd(t),to:_ymd(t)};
  else{const f=new Date();f.setDate(f.getDate()-(+k-1));RANGE={key:k,from:_ymd(f),to:_ymd(t)};}
  document.querySelectorAll('#drange .chip').forEach(b=>b.classList.toggle('act',b.dataset.r===k));
  fillStatsBody();};

  document.querySelectorAll('#drange .chip').forEach(b=>b.classList.remove('act'));fillStatsBody();};

     </div>
     <div class="fld" style="margin-top:12px"><label>Hướng dẫn bán hàng riêng (prompt) — AI ưu tiên tuân theo</label>
       <textarea id="cfgSales" style="min-height:90px" placeholder="VD:&#10;- Nhấn mạnh combo 2 tiết kiệm ~20%, đẩy khách mua số lượng.&#10;- Khách lo giao hàng → cam kết COD 2-4 ngày, trả tiền khi nhận.&#10;- Khách chê đắt → nêu chất lượng + bảo hành + feedback thật.&#10;- Luôn xin tên + SĐT + địa chỉ cụ thể trước khi chốt.">${esc(cfg.salesPrompt||'')}</textarea></div>
   </div>`;
  const rows=d.products.length?d.products:[{}];
  document.getElementById('kblist').innerHTML=
    `<datalist id="imglabels">${IMG_LABELS.map(l=>`<option value="${l}">`).join('')}</datalist>`
    +rows.map(r=>kbCard(r)).join('');
};
const IMG_CATS=['Ảnh sản phẩm','Feedback khách','Thành phần','Công dụng','Ảnh quảng cáo (FB)','Chứng nhận','Khác'];
const CURRENCIES=['AED','SAR','KWD','QAR','OMR','BHD','USD'];
function imgTile(im){im=im||{};const u=im.url||'';const lbl=im.label||'Ảnh sản phẩm';
  const opts=[...IMG_CATS];if(!opts.includes(lbl))opts.unshift(lbl);
  return `<div class="imtile">
   <button class="imx" title="Gỡ ảnh" onclick="this.closest('.imtile').remove()">✕</button>
   <div class="imthumb" ${u?`style="background-image:url('${esc(u)}')"`:''} onclick="const v=this.parentNode.querySelector('[data-img-url]').value;if(v)window.open(v)"></div>
   <input type="hidden" data-img-url value="${esc(u)}">
   <select class="imlabel" data-img-label title="Loại ảnh này là gì">${opts.map(c=>`<option ${lbl===c?'selected':''}>${esc(c)}</option>`).join('')}</select>
  </div>`;}
function addTile(){return `<div class="imtile imadd"><div class="imthumb" onclick="addKbImg(this)"><b style="font-size:22px;font-weight:400;line-height:1">＋</b>Thêm ảnh</div></div>`;}
// Bảng gói giá: lấy từ r.tiers (mới) hoặc suy từ price1/combo2/combo3 (dữ liệu cũ).
function tiersOf(r){
  if(Array.isArray(r.tiers)&&r.tiers.length)return r.tiers.filter(t=>+t.price>0).map(t=>({label:t.label!=null?t.label:(t.qty?`Mua ${t.qty} cái`:''),price:+t.price}));
  const out=[];[['Mua 1 cái',r.price1],['Combo 2 cái',r.combo2],['Combo 3 cái',r.combo3]].forEach(([l,v])=>{if(+v>0)out.push({label:l,price:+v});});
  return out.length?out:[{label:'',price:''}];
}
function tierRow(t){t=t||{};return `<div class="tierrow"><input class="tl" value="${esc(t.label||'')}" placeholder="Mô tả gói: Mua 1 cái / Mua 1 tặng 1 / Combo 2..."><span>—</span><input class="tp" type="number" min="0" value="${t.price??''}" placeholder="giá"><button class="tierx" title="Xoá gói" onclick="this.closest('.tierrow').remove()">✕</button></div>`;}
window.addTierRow=(btn)=>btn.closest('.pricebox').querySelector('.tiers').insertAdjacentHTML('beforeend',tierRow({}));
function kbCard(r){r=r||{};const imgs=(r.images&&r.images.length)?r.images:(r.image?[{url:r.image,label:'Ảnh sản phẩm'}]:[]);
  const cur=r.currency||'AED';const curOpts=[...CURRENCIES];if(!curOpts.includes(cur))curOpts.unshift(cur);
  return `<div class="pcard">
   <div class="phead" onclick="if(!event.target.closest('.pacts'))this.closest('.pcard').classList.toggle('collapsed')">
     <div class="ptitle"><span class="caret">▾</span> <span class="pname">Thông tin sản phẩm</span></div>
     <div class="pacts">
       <button class="actbtn del" title="Xoá sản phẩm" onclick="this.closest('.pcard').remove()">🗑</button>
     </div>
   </div>
   <div class="pbody">
     <input type="hidden" data-k="id" value="${esc(r.id||'SP01')}">
     <div class="fld" style="margin-bottom:14px"><label>Mô tả ngắn (bán hàng)</label><textarea data-k="desc" placeholder="Điểm mạnh, công dụng chính...">${esc(r.desc??'')}</textarea></div>
     <div class="fld" style="margin-bottom:14px"><label>Phân loại (màu / mẫu)</label><input data-k="variant" value="${esc(r.variant||'')}" placeholder="vd: Red, Pink, Nude — để trống nếu chỉ 1 loại"></div>
     <div class="pricebox">
       <span class="pblabel">Bảng giá / ưu đãi — mô tả gói tự do (Mua 1 cái, Mua 1 tặng 1, Combo 2…) + giá</span>
       <div class="tiers">${tiersOf(r).map(tierRow).join('')}</div>
       <div class="row" style="margin-top:4px">
         <button class="btn sm" onclick="addTierRow(this)">➕ Thêm gói giá</button>
         <div class="fld" style="width:130px;margin-left:auto"><label>Tiền tệ</label><select data-k="currency">${curOpts.map(c=>`<option ${cur===c?'selected':''}>${c}</option>`).join('')}</select></div>
       </div>
     </div>
     <div class="imgbox2">
       <div class="muted" style="font-size:12px;margin-bottom:11px"><b>Ảnh sản phẩm</b> — chọn LOẠI từng ảnh (menu dưới ảnh). AI gửi đúng loại khi khách hỏi (feedback, thành phần…).</div>
       <div class="imglist">${imgs.map(imgTile).join('')}${addTile()}</div>
     </div>
   </div>
  </div>`;}
function readCard(card){const o={};card.querySelectorAll('[data-k]').forEach(i=>o[i.dataset.k]=i.value);
  if(!o.id)o.id='SP01';
  o.tiers=[...card.querySelectorAll('.tierrow')].map(r=>({label:r.querySelector('.tl').value.trim(),price:+r.querySelector('.tp').value||0})).filter(t=>t.price>0);
  o.images=[...card.querySelectorAll('.imtile:not(.imadd)')].map(t=>({url:t.querySelector('[data-img-url]').value,label:t.querySelector('[data-img-label]').value})).filter(im=>im.url);return o;}
window.addKbCard=()=>document.getElementById('kblist').insertAdjacentHTML('beforeend',kbCard({}));
window.dupCard=(btn)=>{const card=btn.closest('.pcard');card.classList.remove('collapsed');card.insertAdjacentHTML('afterend',kbCard(readCard(card)));toast('Đã nhân bản — nhớ đổi Mã SP');};
window.importScript=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=async()=>{const f=inp.files[0];if(!f)return;
    toast('Đang phân tích kịch bản Pancake...');
    const dataBase64=await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(f);});
    const d=await post('/import-script',{dataBase64});
    if(d.error){toast(d.error,'bad');return;}
    if(document.getElementById('cfgGreeting')){document.getElementById('cfgGreeting').value=d.greeting||'';document.getElementById('cfgSales').value=d.salesPrompt||'';}
    const list=document.getElementById('kblist');
    // Xoá card trống (chưa có giá & chưa có ảnh) trước khi chèn sản phẩm vừa nhập.
    [...list.querySelectorAll('.pcard')].forEach(c=>{const hasPrice=[...c.querySelectorAll('.tierrow .tp')].some(i=>+i.value>0);const hasImg=c.querySelector('.imtile:not(.imadd)');if(!hasPrice&&!hasImg)c.remove();});
    list.insertAdjacentHTML('beforeend',kbCard(d.product));
    toast(`✓ Đã nhập: ${d.stats.topics} chủ đề · ${d.stats.images} ảnh · giá ${(d.stats.prices||[]).join('/')||'?'}. Kiểm tra giá & loại ảnh rồi bấm Lưu.`,'ok');
  };
  inp.click();};
window.addKbImg=(btn)=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{const f=inp.files[0];if(!f)return;
    if(f.size>10*1024*1024){toast('Ảnh quá lớn (>10MB)','bad');return;}
    const card=btn.closest('.pcard');
    const pageId=document.getElementById('kbpage').value;
    const productId=card.querySelector('input[data-k=id]')?.value||'';
    toast('Đang tải ảnh...');
    const dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(f);});
    const res=await post('/upload-image',{dataUrl,pageId,productId});
    if(res.error){toast(res.error,'bad');return;}
    const list=card.querySelector('.imglist');
    const dflt=list.querySelector('.imtile:not(.imadd)')?'':'Ảnh sản phẩm'; // ảnh đầu mặc định nhãn "Ảnh sản phẩm"
    list.querySelector('.imadd').insertAdjacentHTML('beforebegin',imgTile({url:res.url,label:dflt}));
    toast(res.absolute?'✓ Đã thêm ảnh':'✓ Đã thêm (cần PUBLIC_URL để bot gửi được)','ok');};
  inp.click();};
window.saveKB=async()=>{const pid=document.getElementById('kbpage').value;
  const products=[...document.querySelectorAll('#kblist .pcard')].map(card=>readCard(card)).filter(p=>(p.tiers&&p.tiers.length)||(p.images&&p.images.length)||p.desc);
  // Lưu cấu hình AI (lời chào/giọng/hướng dẫn) + sản phẩm.
  const config={greeting:document.getElementById('cfgGreeting')?.value||'',tone:document.getElementById('cfgTone')?.value||'',salesPrompt:document.getElementById('cfgSales')?.value||''};
  await post('/kb/'+pid+'/config',config);
  const r=await post('/kb/'+pid,{products});
  toast('✓ Đã lưu cấu hình AI + '+r.products+' sản phẩm');document.getElementById('kbmsg').textContent='Cập nhật lúc '+new Date().toLocaleTimeString();};

async function rTokens(){const ts=await j('/tokens');
  sec('tokens').innerHTML=`<h2>⚙️ Cài đặt · API / Token Meta <span class="pill ok" style="vertical-align:middle">failover</span></h2>
   <p class="sub">Nuôi nhiều System Token (nhiều app). App bị FB khóa → tự đánh dấu hỏng & dùng app khác cho page có dự phòng.</p>
   <div class="tablecard" style="margin-bottom:16px"><table><thead><tr><th>Nhãn</th><th>Token</th><th>Trạng thái</th><th></th></tr></thead><tbody>
   ${ts.map(t=>`<tr><td><b>${esc(t.label)}</b></td><td class="mono">${esc(t.tail)}</td><td>${t.healthy?'<span class="pill ok">● khỏe</span>':'<span class="pill bad">● hỏng</span>'}</td><td><button class="btn sm" onclick="rmToken('${t.id}')">Xóa</button></td></tr>`).join('')||'<tr><td colspan=4 class="empty">Chưa có token.</td></tr>'}
   </tbody></table></div>
   <div class="tablecard" style="padding:16px;max-width:620px"><b>Thêm System Token (app khác)</b>
     <div class="row" style="margin-top:10px"><input id="tlabel" placeholder="Nhãn (vd App dự phòng 1)" style="width:200px"><input id="ttoken" placeholder="System User token (EAA...)" style="flex:1"></div>
     <div class="row" style="margin-top:10px"><button class="btn pri" onclick="addTk()">+ Thêm & nạp page</button><button class="btn" onclick="reloadTk()">↻ Nạp lại</button><span id="tkmsg" class="muted"></span></div>
   </div>`;
}
window.addTk=async()=>{const label=document.getElementById('tlabel').value.trim();const token=document.getElementById('ttoken').value.trim();if(!token){toast('Thiếu token','bad');return;}document.getElementById('tkmsg').textContent='đang nạp...';const r=await post('/tokens',{label,token});toast('✓ Nạp '+r.pages+' page');topStatus();rTokens();};
window.rmToken=async id=>{if(!confirm('Xóa token này?'))return;await del('/tokens/'+id);toast('Đã xóa token');topStatus();rTokens();};
window.reloadTk=async()=>{document.getElementById('tkmsg').textContent='đang nạp...';const r=await post('/tokens/reload');toast('✓ '+r.pages+' page');topStatus();rTokens();};

topStatus();setInterval(topStatus,12000);renderHome();
</script>
</body>
</html>
