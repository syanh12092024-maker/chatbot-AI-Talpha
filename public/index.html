<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Closer — Demo Messenger</title>
<style>
  :root{
    --bg:#f0f2f5; --panel:#fff; --me:#0084ff; --them:#e4e6eb; --ink:#050505;
    --muted:#65676b; --line:#dcdfe3; --accent:#0b7c8a; --warn:#d9682e;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  .wrap{max-width:760px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 240px;gap:16px}
  @media(max-width:720px){.wrap{grid-template-columns:1fr}.side{display:none}}
  .phone{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;height:78vh;min-height:460px}
  .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .av{width:38px;height:38px;border-radius:50%;background:#e6f1fb;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px}
  .hd .nm{font-weight:600;font-size:15px}
  .hd .st{font-size:12px;color:var(--muted)}
  .reset{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--muted)}
  .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:#fff}
  .row{display:flex}
  .row.me{justify-content:flex-end}
  .b{max-width:78%;padding:9px 13px;border-radius:18px;font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .them .b{background:var(--them);color:var(--ink);border-bottom-left-radius:5px}
  .me .b{background:var(--me);color:#fff;border-bottom-right-radius:5px}
  .b[dir=rtl]{text-align:right}
  .typing .b{color:var(--muted)}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin:0 2px;animation:bl 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.25}40%{opacity:1}}
  .badge{align-self:center;font-size:11.5px;color:var(--warn);background:#fbede3;border-radius:10px;padding:3px 10px;margin:2px 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-top:1px solid var(--line)}
  .chip{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:5px 10px;cursor:pointer;color:var(--accent)}
  .ipt{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .ipt input{flex:1;border:1px solid var(--line);border-radius:20px;padding:10px 14px;font-size:14px;outline:none}
  .ipt button{border:none;background:var(--me);color:#fff;border-radius:20px;padding:0 16px;font-size:14px;cursor:pointer}
  .ipt button:disabled{opacity:.5;cursor:default}
  .side .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px}
  .side h3{margin:0 0 8px;font-size:13px;color:var(--accent)}
  .side ul{margin:0;padding-left:16px;color:var(--muted);line-height:1.7}
  .warn{color:var(--warn);font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="hd">
      <div class="av">🛍️</div>
      <div style="flex:1;min-width:0">
        <div class="nm">AI Closer — đa-page</div>
        <div class="st">🤖 Tagalog/English · chọn page để test đúng KB</div>
      </div>
      <button class="reset" onclick="resetChat()">Làm lại</button>
    </div>
    <div style="padding:8px 12px;border-bottom:1px solid var(--line)">
      <select id="pageSel" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13px"></select>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="chips" id="chips"></div>
    <div class="ipt">
      <input id="inp" placeholder="Nhập tin như khách (Ả Rập / Anh / Việt)…" autocomplete="off" />
      <button id="send" onclick="send()">Gửi</button>
    </div>
  </div>
  <div class="side">
    <div class="card">
      <h3>Demo AI Closer</h3>
      <ul>
        <li>Tư vấn Tagalog / Anh</li>
        <li>Gỡ chê giá → combo</li>
        <li>Xác nhận địa chỉ + COD</li>
        <li>Tạo đơn (chống bom hàng)</li>
      </ul>
      <div id="keywarn" class="warn" style="display:none">⚠️ Chưa điền ANTHROPIC_API_KEY trong .env</div>
    </div>
  </div>
</div>
<script>
const sessionId = (localStorage.sid ||= Math.random().toString(36).slice(2));
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('send');
const pageSel = document.getElementById('pageSel');
let pageId = '';
const SAMPLES = ['Magkano po ang massager?','Mahal naman','Sige, dalawa po','Do you deliver to Manila?'];

function isArabic(s){ return /[؀-ۿ]/.test(s); }
function bubble(text, who){
  const row = document.createElement('div'); row.className = 'row ' + who;
  const b = document.createElement('div'); b.className = 'b';
  if (isArabic(text)) b.dir = 'rtl';
  b.textContent = text; row.appendChild(b); msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight; return row;
}
function badge(t){ const d=document.createElement('div'); d.className='badge'; d.textContent=t; msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; }
function typing(){
  const row=document.createElement('div'); row.className='row them typing';
  row.innerHTML='<div class="b"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  msgs.appendChild(row); msgs.scrollTop=msgs.scrollHeight; return row;
}
async function send(text){
  text = (text ?? inp.value).trim(); if(!text) return;
  inp.value=''; sendBtn.disabled=true;
  bubble(text,'me');
  const t = typing();
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId,text,pageId})});
    const data = await r.json(); t.remove();
    if(!r.ok){ bubble('⚠️ ' + (data.error||'Lỗi server'),'them'); }
    else if(data.archived){ badge('tin bị coi là spam — bỏ qua'); }
    else { if(data.reply) bubble(data.reply,'them'); if(data.handoff) badge('→ đã chuyển cho nhân viên thật'); }
  }catch(e){ t.remove(); bubble('⚠️ '+e.message,'them'); }
  sendBtn.disabled=false; inp.focus();
}
async function resetChat(){
  await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId,pageId})});
  msgs.innerHTML=''; greet();
}
function greet(){ bubble('Hello po! 👋 Anong maitutulong ko sa inyo today?','them'); }
inp.addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
const chips=document.getElementById('chips');
SAMPLES.forEach(s=>{ const c=document.createElement('span'); c.className='chip'; c.dir=isArabic(s)?'rtl':'ltr'; c.textContent=s; c.onclick=()=>send(s); chips.appendChild(c); });
pageSel.addEventListener('change',()=>{ pageId=pageSel.value; msgs.innerHTML=''; greet(); });
fetch('/api/info').then(r=>r.json()).then(d=>{
  if(!d.hasKey) document.getElementById('keywarn').style.display='block';
  const pages=d.pages||[];
  pageSel.innerHTML = pages.length
    ? pages.map(p=>`<option value="${p.id}">${p.name||p.id}${p.products!=null?` — ${p.products} SP`:''}</option>`).join('')
    : '<option value="">(chưa có page)</option>';
  pageId = pages[0]?.id || '';
});
greet();
</script>
</body>
</html>
